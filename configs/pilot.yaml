name: federated-tabpfn-pilot
objective: benchmark federated TabPFN against comparable tabular models
framework: flower
execution_mode: local
datasets:
  - adult_engineering_slice
  - tabpfn_paper_cc18_numerical_18
  - tabpfn_paper_openml_numerical_holdout
baselines:
  - logistic_regression
  - random_forest
  - xgboost
  - mlp
  - tabpfn
split_regimes:
  - iid
  - label_skew
  - quantity_skew
pilot:
  selected_dataset: adult_engineering_slice
  selected_baseline: logistic_regression
  selected_split_regime: iid
  num_clients: 2
  num_rounds: 1
  smoke_test: true
  dataset_backed_max_rows: 2000
submission_target:
  venue: ICML 2026 Workshop on Foundation Models for Structured Data
  deadline: 2026-05-08
  page_limit: 4
  strategy: workshop-first
study_plan:
  primary_submission_scope: iid_only
  primary_core_baselines:
    - random_forest
    - xgboost
    - tabpfn
  non_iid_extension_scope: paper_track_core
  preferred_non_iid_order:
    - label_skew
    - quantity_skew
    - feature_skew
  optional_foundation_model_comparators:
    - tabh2o
  secondary_baselines:
    - mlp
    - logistic_regression
  non_iid_only_if_time_remains: true
metrics:
  - accuracy
  - roc_auc
  - log_loss
  - runtime_seconds
  - train_seconds
  - estimated_upstream_bytes
  - estimated_downstream_bytes
  - model_parameter_bytes
  - process_user_cpu_seconds
  - process_system_cpu_seconds
  - max_rss_bytes
notes:
  - The executable engineering slice currently covers Adult plus federated logistic regression and XGBoost.
  - The study-facing shortlist is locked to the 18-dataset numerical no-missing OpenML-CC18 subset used in the original TabPFN paper.
  - Migrate all executable runs to Flower's Message API before expanding the benchmark matrix.
  - Prioritize a workshop-ready IID comparison story before widening to non-IID regimes.
  - Treat TabH2O as an optional comparator only if integration is low-friction and does not delay the workshop path.
